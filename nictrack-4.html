<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="NicTrack">
<title>NicTrack</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #000;
    --surface: #111;
    --surface2: #1a1a1a;
    --border: rgba(255,255,255,0.1);
    --border-strong: rgba(255,255,255,0.25);
    --text: #fff;
    --text-mid: rgba(255,255,255,0.55);
    --text-dim: rgba(255,255,255,0.3);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    min-height: 100dvh;
    padding-top: max(env(safe-area-inset-top, 0px), 20px);
    padding-bottom: max(env(safe-area-inset-bottom, 0px), 20px);
  }

  .app {
    max-width: 430px;
    margin: 0 auto;
    padding: 0 16px 40px;
  }

  /* HEADER */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0 28px;
  }

  .logo {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.2em;
    color: var(--text);
    text-transform: uppercase;
  }

  .date-badge {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  /* TYPE SELECTOR */


  /* LOG BUTTON */
  .log-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    margin-bottom: 40px;
  }

  .log-btn-wrap {
    position: relative;
    width: 160px;
    height: 160px;
  }

  .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.12);
    animation: ringpulse 3s ease-out infinite;
    pointer-events: none;
  }

  .ring:nth-child(2) { animation-delay: 1.5s; }

  @keyframes ringpulse {
    0%   { transform: scale(1);    opacity: 0.4; }
    100% { transform: scale(1.22); opacity: 0; }
  }

  .log-btn {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.4);
    background: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    outline: none;
    position: relative;
    transition: transform 0.12s ease, border-color 0.12s ease;
  }

  .log-btn:active {
    transform: scale(0.91);
    border-color: #fff;
    background: rgba(255,255,255,0.04);
  }

  .log-btn .plus {
    font-size: 48px;
    font-weight: 300;
    color: #fff;
    line-height: 1;
  }

  .log-btn .btn-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-mid);
  }

  .today-count {
    text-align: center;
  }

  .today-count .num {
    font-size: 60px;
    font-weight: 300;
    color: #fff;
    line-height: 1;
    letter-spacing: -0.03em;
  }

  .today-count .lbl {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 5px;
  }

  /* SECTION LABEL */
  .section-lbl {
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  /* STAT CARDS */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
  }

  .stat-card.wide {
    grid-column: span 2;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
  }

  .stat-period {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .stat-val {
    font-size: 32px;
    font-weight: 300;
    color: #fff;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .stat-sub {
    font-size: 9px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* INSIGHTS */
  .insights-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }

  .insight-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 8px;
    text-align: center;
  }

  .insight-val {
    font-size: 26px;
    font-weight: 300;
    color: #fff;
    letter-spacing: -0.02em;
  }

  .insight-lbl {
    font-size: 8px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 5px;
    line-height: 1.4;
  }

  /* BAR CHART */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 8px;
  }

  .bar-chart {
    display: flex;
    align-items: flex-end;
    gap: 5px;
    height: 72px;
  }

  .bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    height: 100%;
    justify-content: flex-end;
  }

  .bar-fill {
    width: 100%;
    border-radius: 3px 3px 1px 1px;
    background: rgba(255,255,255,0.25);
    min-height: 3px;
    transition: height 0.4s ease;
  }

  .bar-fill.today { background: #fff; }

  .bar-lbl {
    font-size: 8px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .bar-lbl.today { color: #fff; }

  /* LOG LIST */
  .log-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 8px;
  }

  .log-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .clear-btn {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.12s;
    outline: none;
  }

  .clear-btn:active { color: #fff; border-color: rgba(255,255,255,0.4); }

  .log-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
    max-height: 200px;
    overflow-y: auto;
  }

  .log-list::-webkit-scrollbar { width: 2px; }
  .log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 1px; }

  .log-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 12px;
    background: var(--surface2);
    border-radius: 8px;
    animation: slidein 0.25s ease;
  }

  @keyframes slidein {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .log-time { font-size: 13px; color: #fff; }
  .log-type { font-size: 10px; color: var(--text-mid); letter-spacing: 0.08em; }

  .log-empty {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    padding: 14px 0;
    letter-spacing: 0.08em;
  }

  /* DIVIDER */
  .divider { margin: 20px 0 16px; border: none; border-top: 1px solid var(--border); }

  /* TOAST */
  .toast {
    position: fixed;
    top: max(env(safe-area-inset-top, 0px), 20px);
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: #fff;
    color: #000;
    padding: 10px 22px;
    border-radius: 50px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    z-index: 100;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* INSTALL HINT */
  .install-hint {
    text-align: center;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    line-height: 1.7;
    padding: 14px;
    border: 1px dashed rgba(255,255,255,0.12);
    border-radius: 12px;
    margin-top: 20px;
  }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="app">

  <div class="header">
    <div class="logo">Nictrack</div>
    <div class="date-badge" id="date-display"></div>
  </div>



  <!-- LOG BUTTON -->
  <div class="log-center">
    <div class="log-btn-wrap">
      <div class="ring"></div>
      <div class="ring"></div>
      <button class="log-btn" id="log-btn" onclick="logUse()">
        <div class="plus">+</div>
        <div class="btn-label">Log Use</div>
      </button>
    </div>
    <div class="today-count">
      <div class="num" id="today-num">0</div>
      <div class="lbl">uses today</div>
    </div>
  </div>

  <!-- STATS -->
  <div class="section-lbl">Statistics</div>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-period">This week</div>
      <div class="stat-val" id="week-val">0</div>
      <div class="stat-sub">uses</div>
    </div>
    <div class="stat-card">
      <div class="stat-period">This month</div>
      <div class="stat-val" id="month-val">0</div>
      <div class="stat-sub">uses</div>
    </div>
    <div class="stat-card wide">
      <div>
        <div class="stat-period">This year</div>
        <div class="stat-val" id="year-val">0</div>
      </div>
      <div style="text-align:right">
        <div class="stat-period">Daily avg (30d)</div>
        <div class="stat-val" id="avg-val">0.0</div>
      </div>
    </div>
  </div>

  <hr class="divider">

  <!-- INSIGHTS -->
  <div class="section-lbl">Insights</div>
  <div class="insights-grid">
    <div class="insight-card">
      <div class="insight-val" id="clean-val">0</div>
      <div class="insight-lbl">Clean days</div>
    </div>
    <div class="insight-card">
      <div class="insight-val" id="tracked-val">0</div>
      <div class="insight-lbl">Days tracked</div>
    </div>
    <div class="insight-card">
      <div class="insight-val" id="peak-val">0</div>
      <div class="insight-lbl">Most in a day</div>
    </div>
  </div>

  <hr class="divider">

  <!-- 7-DAY CHART -->
  <div class="chart-card">
    <div class="section-lbl" style="margin-bottom:14px">Last 7 days</div>
    <div class="bar-chart" id="bar-chart"></div>
  </div>

  <!-- LOG -->
  <div class="log-card">
    <div class="log-header">
      <div class="section-lbl" style="margin:0">Today's log</div>
      <button class="clear-btn" onclick="clearToday()">Clear today</button>
    </div>
    <div class="log-list" id="log-list">
      <div class="log-empty">nothing logged yet</div>
    </div>
  </div>

  <div class="install-hint">
    Add to Home Screen: tap Share in Safari then "Add to Home Screen"
  </div>

</div>

<script>
  const KEY = 'nictrack_v2';
  const selectedType = 'Pouch';

  function getData() {
    try { return JSON.parse(localStorage.getItem(KEY)) || { logs: [] }; }
    catch { return { logs: [] }; }
  }

  function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

  function dateStr(d) {
    return (d || new Date()).toISOString().slice(0, 10);
  }

  function logUse() {
    const d = getData();
    d.logs.push({ ts: Date.now(), type: selectedType, date: dateStr() });
    save(d);
    render();
    toast('+1 ' + selectedType);
    const btn = document.getElementById('log-btn');
    btn.style.transform = 'scale(0.9)';
    setTimeout(() => btn.style.transform = '', 140);
  }

  function clearToday() {
    if (!confirm("Clear all of today's logs?")) return;
    const d = getData();
    d.logs = d.logs.filter(l => l.date !== dateStr());
    save(d);
    render();
    toast('Cleared');
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1700);
  }

  function render() {
    const { logs } = getData();
    const now = new Date();
    const today = dateStr();

    // By date map
    const byDate = {};
    logs.forEach(l => { byDate[l.date] = (byDate[l.date] || 0) + 1; });

    // Today
    const todayLogs = logs.filter(l => l.date === today);
    document.getElementById('today-num').textContent = todayLogs.length;

    // Week
    const wd = new Date(now);
    wd.setDate(wd.getDate() - ((wd.getDay() + 6) % 7));
    wd.setHours(0,0,0,0);
    document.getElementById('week-val').textContent = logs.filter(l => new Date(l.ts) >= wd).length;

    // Month
    const ms = new Date(now.getFullYear(), now.getMonth(), 1);
    document.getElementById('month-val').textContent = logs.filter(l => new Date(l.ts) >= ms).length;

    // Year
    const ys = new Date(now.getFullYear(), 0, 1);
    document.getElementById('year-val').textContent = logs.filter(l => new Date(l.ts) >= ys).length;

    // 30-day avg
    const s30 = new Date(now); s30.setDate(s30.getDate() - 30);
    const l30 = logs.filter(l => new Date(l.ts) >= s30);
    document.getElementById('avg-val').textContent = (l30.length / 30).toFixed(1);

    // Clean day streak — count consecutive days going back from yesterday with NO use
    // (today doesn't count yet since it might still be early)
    // Clean streak: consecutive days with no use, starting from today going back,
    // but only counting days on or after the first ever log date.
    const allLogDates = Object.keys(byDate).sort();
    const firstLogDate = allLogDates.length ? allLogDates[0] : today;
    let cleanStreak = 0;
    const check = new Date(now);
    for (let i = 0; i < 365; i++) {
      const ds = dateStr(check);
      if (ds < firstLogDate) break; // don't count days before tracking started
      if (!byDate[ds]) { cleanStreak++; }
      else break;
      check.setDate(check.getDate() - 1);
    }
    document.getElementById('clean-val').textContent = cleanStreak;

    // Days tracked (any day with at least 1 log)
    document.getElementById('tracked-val').textContent = Object.keys(byDate).length;

    // Peak
    document.getElementById('peak-val').textContent = Math.max(...Object.values(byDate), 0);

    // Bar chart
    const chart = document.getElementById('bar-chart');
    chart.innerHTML = '';
    const days = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(now); d.setDate(d.getDate() - i);
      days.push({ date: dateStr(d), lbl: ['Su','Mo','Tu','We','Th','Fr','Sa'][d.getDay()] });
    }
    const maxVal = Math.max(...days.map(d => byDate[d.date] || 0), 1);
    days.forEach(d => {
      const val = byDate[d.date] || 0;
      const pct = Math.max((val / maxVal) * 100, 4);
      const isToday = d.date === today;
      const col = document.createElement('div');
      col.className = 'bar-col';
      col.innerHTML = `
        <div class="bar-fill${isToday ? ' today' : ''}" style="height:${pct}%"></div>
        <div class="bar-lbl${isToday ? ' today' : ''}">${d.lbl}</div>
      `;
      chart.appendChild(col);
    });

    // Log list
    const list = document.getElementById('log-list');
    if (!todayLogs.length) {
      list.innerHTML = '<div class="log-empty">nothing logged yet</div>';
    } else {
      list.innerHTML = [...todayLogs].reverse().slice(0, 12).map((l, i) => {
        const t = new Date(l.ts);
        const hh = String(t.getHours()).padStart(2,'0');
        const mm = String(t.getMinutes()).padStart(2,'0');
        return `<div class="log-item" style="${i===0?'animation:slidein 0.25s ease':''}">
          <div class="log-time">${hh}:${mm}</div>
        </div>`;
      }).join('');
    }

    // Date
    document.getElementById('date-display').textContent =
      now.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }).toUpperCase();
  }

  render();
  setInterval(render, 60000);
</script>
</body>
</html>
